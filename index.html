<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' fill='white' font-family='monospace' font-weight='bold'>N</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <title>LEGACY OS</title>
</head>
<body>

  <header class="os-header">
    <div class="os-brand">LEGACY<span class="os-ver">OS</span></div>
    <div class="agent-status-bar" id="agentStatusBar"></div>
    <div class="os-time" id="osTime"></div>
  </header>

  <nav class="module-nav">
    <button class="mod-btn active" data-module="home">HOME</button>
    <button class="mod-btn" data-module="finance">FINANCE</button>
    <button class="mod-btn" data-module="noire">NOIRE</button>
    <button class="mod-btn" data-module="body">BODY</button>
    <button class="mod-btn" data-module="agents">AGENTS</button>
    <button class="mod-btn" data-module="legacy">LEGACY</button>
  </nav>

  <main class="os-main">
    <section id="mod-home"    class="module active" data-agent="home"></section>
    <section id="mod-finance" class="module"        data-agent="finance"></section>
    <section id="mod-noire"   class="module"        data-agent="noire"></section>
    <section id="mod-body"    class="module"        data-agent="body"></section>
    <section id="mod-agents"  class="module"        data-agent="agents"></section>
    <section id="mod-legacy"  class="module"        data-agent="legacy"></section>
  </main>

  <div class="cmd-bar" id="cmdBar">
    <span class="cmd-prompt">›</span>
    <input type="text" id="cmdInput" class="cmd-input"
           placeholder="command… press / to focus · ? for help"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="cmd-help-btn" id="cmdHelpBtn">?</button>
  </div>

  <div class="overlay" id="overlay" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle"></span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
